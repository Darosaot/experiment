# Netlify configuration for QuickTools (static site — no build step needed)

[build]
  publish = "."
  command = ""

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets aggressively (they're versioned by content rarely changing)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Serve the SVG icon for /favicon.ico requests (avoids crawler 404s)
[[redirects]]
  from = "/favicon.ico"
  to = "/assets/icon.svg"
  status = 200

# Pretty 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
